name: Latest blog post workflow
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v2
        with:
          feed_list: "https://jeangalea.com/feed/"
          max_post_count: 5
